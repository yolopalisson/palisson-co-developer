<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<title>Co-developer · Palisson Technologies</title>
<style>
:root {
  --teal:#008080;--teal-dark:#005f5f;--teal-light:#e0f2f2;--teal-mid:#00a0a0;
  --black:#111;--gray-900:#1a1a1a;--gray-800:#2a2a2a;--gray-700:#3a3a3a;
  --gray-600:#555;--gray-400:#999;--gray-300:#ccc;--gray-200:#e8e8e8;--gray-100:#f4f4f4;
  --white:#fff;--red:#c0392b;--red-light:#fff1f0;--red-border:#ffa39e;
  --font:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif,'Poppins';
  --mono:'Fira Mono','Poppins',monospace;
  --r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray-100);color:var(--black);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── LAYOUT ── */
header{background:var(--black);padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--teal);flex-shrink:0;z-index:100;}
.hlogo svg{width:28px;height:28px;}
header h1{font-size:14px;font-weight:700;color:var(--white);letter-spacing:.02em;}
header h1 span{color:var(--teal-mid);}
.hbadge{background:var(--teal);color:var(--white);font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;corner-shape: squircle;letter-spacing:.05em;}
.hbtn{background:none;border:1px solid #444;color:#aaa;font-size:11px;padding:3px 10px;border-radius:20px;corner-shape: squircle;cursor:pointer;transition:all .15s;margin-left:6px;}
.hbtn:hover{border-color:var(--teal);color:var(--teal-mid);}
.ml-auto{margin-left:auto;display:flex;align-items:center;gap:6px;}

.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 50px);}

/* ── LEFT NAV ── */
.leftnav{width:210px;flex-shrink:0;background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden;}
.nav-section{padding:14px 12px 6px;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gray-400);text-transform:uppercase;}
.nav-btn{background:none;border:none;cursor:pointer;text-align:left;padding:8px 12px;border-radius:var(--r);corner-shape: squircle;font-size:12.5px;color:var(--gray-600);display:flex;align-items:center;gap:7px;transition:all .15s;width:calc(100% - 8px);margin:0 4px;}
.nav-btn:hover{background:var(--gray-100);color:var(--black);}
.nav-btn.active{background:var(--teal-light);color:var(--teal-dark);font-weight:600;}
.nav-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.stack-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 10px;}
.stag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;corner-shape: squircle;background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);}
.stag.on{background:var(--teal-light);color:var(--teal-dark);border-color:var(--teal);}
.ctx-box{padding:10px 12px;font-size:11px;color:var(--gray-600);line-height:1.6;border-top:1px solid var(--gray-200);margin-top:auto;}

/* ── MAIN PANEL ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* ── TABS (History / Projects) ── */
.panel-tabs{display:flex;border-bottom:1px solid var(--gray-200);background:var(--white);flex-shrink:0;}
.ptab{flex:1;padding:10px;font-size:12px;font-weight:600;color:var(--gray-400);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.02em;}
.ptab.active{color:var(--teal-dark);border-bottom-color:var(--teal);}
.ptab:hover:not(.active){color:var(--black);}

/* ── CHAT PANEL ── */
#chatPanel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-topbar{padding:8px 16px;background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.session-name{font-size:13px;font-weight:600;color:var(--black);flex:1;cursor:pointer;padding:3px 6px;border-radius:4px;corner-shape: squircle;transition:background .15s;}
.session-name:hover{background:var(--gray-100);}
.session-name-input{flex:1;font-size:13px;font-weight:600;border:1.5px solid var(--teal);border-radius:4px;corner-shape: squircle;padding:3px 6px;outline:none;font-family:var(--font);}
.tbar-btn{background:none;border:1px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:5px 10px;font-size:11.5px;color:var(--gray-600);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbar-btn:hover{border-color:var(--teal);color:var(--teal-dark);}
.tbar-btn.danger:hover{border-color:var(--red);color:var(--red);}

.chat-window{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px;}
.msg{display:flex;gap:10px;max-width:800px;width:100%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.avatar{width:30px;height:30px;border-radius:50%;corner-shape: squircle;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:2px;}
.avatar.agent{background:var(--teal);color:var(--white);}
.avatar.user{background:var(--black);color:var(--white);}
.bubble{padding:11px 15px;border-radius:var(--rl);corner-shape: squircle;font-size:13.5px;line-height:1.65;max-width:660px;}
.msg.agent .bubble{background:var(--white);border:1px solid var(--gray-200);border-radius:4px var(--rl) var(--rl) var(--rl);corner-shape: squircle;}
.msg.user .bubble{background:var(--teal);color:var(--white);border-radius:var(--rl) 4px var(--rl) var(--rl);corner-shape: squircle;}
.bubble pre{background:var(--gray-900);color:#e0f2f2;border-radius:6px;corner-shape: squircle;padding:12px 14px;font-size:12px;line-height:1.5;overflow-x:auto;margin:8px 0;font-family:var(--mono);position:relative;}
.bubble pre .copy-code{position:absolute;top:6px;right:6px;background:var(--gray-700);color:#ccc;border:none;border-radius:4px;corner-shape: squircle;padding:2px 8px;font-size:10px;cursor:pointer;transition:all .15s;}
.bubble pre .copy-code:hover{background:var(--teal);color:var(--white);}
.bubble code{background:var(--gray-100);color:var(--teal-dark);padding:1px 5px;border-radius:4px;corner-shape: squircle;font-size:12px;font-family:var(--mono);}
.bubble pre code{background:none;color:inherit;padding:0;}
.bubble ul,.bubble ol{padding-left:18px;margin:5px 0;}
.bubble li{margin:3px 0;}
.bubble strong{font-weight:700;}
.bubble p{margin:4px 0;}
.mode-divider{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--gray-400);text-transform:uppercase;text-align:center;padding:4px 0;}
.thinking{display:flex;gap:5px;align-items:center;padding:12px 15px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);corner-shape: squircle;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.err-bubble{background:var(--red-light);border:1px solid var(--red-border);color:var(--red);padding:10px 14px;border-radius:var(--r);font-size:13px;corner-shape: squircle;}

.quick-prompts{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 12px;background:var(--white);border-top:1px solid var(--gray-200);}
.qp{font-size:11.5px;color:var(--teal-dark);background:var(--teal-light);border:1px solid var(--teal);border-radius:20px;padding:4px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.qp:hover{background:var(--teal);color:var(--white);}
.input-bar{border-top:1px solid var(--gray-200);background:var(--white);padding:12px 18px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.input-wrap{flex:1;background:var(--gray-100);border:1.5px solid var(--gray-200);border-radius:var(--rl);corner-shape: squircle;display:flex;align-items:flex-end;transition:border-color .15s;overflow:hidden;}
.input-wrap:focus-within{border-color:var(--teal);}
textarea{flex:1;border:none;background:transparent;resize:none;font-family:var(--font);font-size:13.5px;color:var(--black);padding:10px 12px;line-height:1.5;max-height:130px;outline:none;}
textarea::placeholder{color:var(--gray-400);}
.send-btn{background:var(--teal);border:none;color:var(--white);width:36px;height:36px;border-radius:10px;corner-shape: squircle;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:5px 5px 5px 0;flex-shrink:0;transition:background .15s;}
.send-btn:hover{background:var(--teal-dark);}
.send-btn:disabled{background:var(--gray-200);cursor:not-allowed;}

/* ── HISTORY PANEL ── */
#historyPanel{flex:1;display:none;flex-direction:column;overflow:hidden;}
#historyPanel.visible{display:flex;}
.panel-toolbar{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.panel-toolbar input{flex:1;border:1.5px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:7px 10px;font-size:13px;outline:none;font-family:var(--font);transition:border-color .15s;}
.panel-toolbar input:focus{border-color:var(--teal);}
.session-list{flex:1;overflow-y:auto;padding:12px;}
.session-item{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;}
.session-item:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,128,128,.08);}
.session-item.current{border-color:var(--teal);background:var(--teal-light);}
.si-info{flex:1;min-width:0;}
.si-name{font-size:13px;font-weight:600;color:var(--black);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-meta{font-size:11px;color:var(--gray-400);}
.si-preview{font-size:12px;color:var(--gray-600);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-del{background:none;border:none;color:var(--gray-300);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;corner-shape: squircle;transition:color .15s;flex-shrink:0;}
.si-del:hover{color:var(--red);}
.empty-state{text-align:center;padding:48px 24px;color:var(--gray-400);}
.empty-state .es-icon{font-size:36px;margin-bottom:12px;}
.empty-state p{font-size:13px;line-height:1.6;}

/* ── PROJECTS PANEL ── */
#projectsPanel{flex:1;display:none;flex-direction:column;overflow:hidden;}
#projectsPanel.visible{display:flex;}
.projects-split{display:flex;flex:1;overflow:hidden;}
.projects-list{width:220px;flex-shrink:0;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden;}
.pl-toolbar{padding:10px 12px;border-bottom:1px solid var(--gray-200);background:var(--white);}
.pl-title{font-size:12px;font-weight:700;color:var(--black);margin-bottom:8px;letter-spacing:.02em;}
.new-proj-btn{width:100%;background:var(--teal);color:var(--white);border:none;border-radius:var(--r);corner-shape: squircle;padding:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.new-proj-btn:hover{background:var(--teal-dark);}
.pl-items{flex:1;overflow-y:auto;padding:8px;}
.proj-item{padding:9px 10px;border-radius:var(--r);corner-shape: squircle;cursor:pointer;transition:all .15s;margin-bottom:4px;border:1px solid transparent;}
.proj-item:hover{background:var(--gray-100);}
.proj-item.active{background:var(--teal-light);border-color:var(--teal);}
.proj-name{font-size:12.5px;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-client{font-size:11px;color:var(--gray-400);margin-top:1px;}
.proj-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--gray-100);}
.no-proj{flex:1;display:flex;align-items:center;justify-content:center;color:var(--gray-400);font-size:13px;text-align:center;padding:24px;}
.proj-header{padding:16px 20px;background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.proj-title-inp{flex:1;font-size:15px;font-weight:700;border:none;background:transparent;outline:none;color:var(--black);font-family:var(--font);}
.proj-del-btn{background:none;border:1px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:5px 10px;font-size:11px;color:var(--gray-400);cursor:pointer;transition:all .15s;}
.proj-del-btn:hover{border-color:var(--red);color:var(--red);}
.proj-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.proj-field label{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--gray-400);text-transform:uppercase;display:block;margin-bottom:5px;}
.proj-field input,.proj-field textarea,.proj-field select{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:8px 10px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;background:var(--white);color:var(--black);resize:vertical;}
.proj-field input:focus,.proj-field textarea:focus,.proj-field select:focus{border-color:var(--teal);}
.proj-field textarea{min-height:80px;line-height:1.5;}
.status-badge{display:inline-block;padding:2px 10px;border-radius:20px;corner-shape: squircle;font-size:11px;font-weight:600;}
.status-active{background:#e6f4ea;color:#1e7e34;}
.status-prospect{background:#fff3cd;color:#856404;}
.status-completed{background:var(--gray-100);color:var(--gray-600);}
.proj-tags-inp{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:8px 10px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;background:var(--white);}
.proj-tags-inp:focus{border-color:var(--teal);}
.tags-display{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ptag{background:var(--teal-light);color:var(--teal-dark);border:1px solid var(--teal);border-radius:20px;corner-shape: squircle;font-size:11px;font-weight:600;padding:2px 9px;display:flex;align-items:center;gap:4px;}
.ptag button{background:none;border:none;color:var(--teal-dark);cursor:pointer;font-size:12px;padding:0;line-height:1;}
.proj-chat-btn{background:var(--teal);color:var(--white);border:none;border-radius:var(--r);corner-shape: squircle;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;align-self:flex-start;}
.proj-chat-btn:hover{background:var(--teal-dark);}
.save-indicator{font-size:11px;color:var(--gray-400);margin-left:auto;}

/* ── EXPORT MODAL ── */
#exportModal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:3000;padding:20px;}
#exportModal.hidden{display:none;}
.modal-card{background:var(--white);border-radius:var(--rl);corner-shape: squircle;padding:28px 32px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-card h3{font-size:16px;font-weight:700;margin-bottom:6px;}
.modal-card p{font-size:13px;color:var(--gray-600);margin-bottom:20px;line-height:1.5;}
.export-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.export-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;cursor:pointer;transition:all .15s;}
.export-opt:hover,.export-opt.selected{border-color:var(--teal);background:var(--teal-light);}
.export-opt input[type=radio]{accent-color:var(--teal);}
.export-opt-label{font-size:13px;font-weight:600;color:var(--black);}
.export-opt-desc{font-size:11px;color:var(--gray-400);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-cancel{background:none;border:1px solid var(--gray-200);border-radius:var(--r);corner-shape: squircle;padding:8px 16px;font-size:13px;cursor:pointer;transition:all .15s;}
.modal-cancel:hover{border-color:var(--gray-400);}
.modal-export-btn{background:var(--teal);color:var(--white);border:none;border-radius:var(--r);corner-shape: squircle;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.modal-export-btn:hover{background:var(--teal-dark);}

/* ── RESPONSIVE DESIGN ── */
.nav-toggle{background:none;border:none;color:var(--white);font-size:20px;cursor:pointer;padding:8px 12px;display:none;border-radius:var(--r);corner-shape:squircle;transition:background .15s;}
.nav-toggle:hover{background:rgba(255,255,255,.1);}

@media (max-width:768px){
  .app{height:calc(100vh - 42px);}
  .leftnav{position:fixed;left:0;top:50px;width:100%;max-width:100%;max-height:calc(100vh - 50px);z-index:999;border-right:none;border-bottom:1px solid var(--gray-200);transform:translateX(-100%);transition:transform .3s ease;overflow-y:auto;}
  .leftnav.open{transform:translateX(0);}
  .nav-toggle{display:block;}
  .main{width:100%;}
  header{padding:8px 12px;}
  header h1{font-size:13px;}
  .hbadge{font-size:9px;padding:1px 6px;}
  .hbtn{font-size:10px;padding:2px 8px;}
  
  .nav-section{padding:10px 12px 4px;font-size:9px;}
  .nav-btn{padding:6px 10px;font-size:11px;width:calc(100% - 4px);margin:0 2px;}
  .nav-icon{width:16px;height:16px;font-size:12px;}
  .stack-tags{padding:0 10px 8px;}
  .stag{font-size:9px;padding:1px 5px;}
  .ctx-box{font-size:10px;padding:8px 10px;}
  
  .panel-tabs{flex-wrap:wrap;}
  .ptab{padding:8px;font-size:11px;}
  
  .chat-topbar{padding:6px 12px;flex-wrap:wrap;gap:4px;}
  .session-name{font-size:12px;padding:2px 4px;}
  .tbar-btn{padding:4px 8px;font-size:10px;}
  
  .chat-window{padding:12px 16px;gap:12px;}
  .msg{max-width:100%;width:100%;}
  .bubble{padding:8px 12px;font-size:12px;max-width:90vw;}
  .avatar{width:28px;height:28px;font-size:10px;}
  
  .quick-prompts{padding:0 12px 8px;gap:4px;}
  .qp{font-size:10px;padding:3px 8px;}
  
  .input-bar{padding:8px 12px;gap:6px;}
  .input-wrap{border-radius:var(--r);}
  textarea{font-size:12px;padding:8px 10px;}
  .send-btn{width:32px;height:32px;margin:3px 3px 3px 0;}
  
  /* Project split layout */
  .projects-split{flex-direction:column;}
  .projects-list{width:100%;border-right:none;border-bottom:1px solid var(--gray-200);max-height:200px;}
  .proj-detail{flex:1;}
  
  .proj-header{padding:12px 16px;}
  .proj-title-inp{font-size:14px;}
  .proj-del-btn{padding:4px 8px;font-size:10px;}
  .proj-body{padding:12px 16px;gap:10px;}
  .proj-field label{font-size:9px;}
  .proj-field input,.proj-field textarea,.proj-field select{padding:6px 8px;font-size:12px;}
  .proj-field textarea{min-height:60px;}
  .proj-chat-btn{padding:7px 12px;font-size:12px;}
  
  /* History/Projects panels */
  .panel-toolbar{padding:8px 12px;}
  .panel-toolbar input{font-size:12px;padding:6px 8px;}
  .session-list{padding:8px;}
  .session-item{padding:10px;margin-bottom:6px;}
  .si-name{font-size:12px;}
  .si-meta{font-size:10px;}
  .si-preview{font-size:11px;}
  .si-del{font-size:14px;padding:1px 3px;}
  
  /* Modal responsive */
  .modal-card{padding:20px 24px;max-width:90vw;}
  .export-opt{padding:8px 10px;}
  .export-opt-label{font-size:12px;}
  .export-opt-desc{font-size:10px;}
  .modal-cancel,.modal-export-btn{padding:6px 12px;font-size:12px;}
}

@media (max-width:480px){
  body{overflow-x:hidden;}
  header{padding:6px 8px;}
  header h1{font-size:12px;}
  .hlogo svg{width:24px;height:24px;}
  .hbadge{display:none;}
  .ml-auto{gap:4px;}
  
  .leftnav{max-height:calc(100vh - 40px);}
  .nav-section{padding:8px 10px 3px;font-size:8px;}
  .nav-btn{padding:5px 8px;font-size:10px;gap:5px;}
  .nav-icon{width:14px;height:14px;font-size:11px;}
  .stack-tags{padding:0 8px 6px;gap:3px;}
  .stag{font-size:8px;padding:1px 4px;}
  .ctx-box{font-size:9px;padding:6px 8px;line-height:1.4;}
  
  .ptab{padding:6px;font-size:10px;}
  
  .chat-topbar{padding:5px 8px;}
  .session-name{font-size:11px;}
  .tbar-btn{padding:3px 6px;font-size:9px;}
  
  .chat-window{padding:8px 12px;gap:10px;}

  .bubble pre{padding:8px 10px;font-size:10px;}
  .bubble code{font-size:10px;padding:0 3px;}
  
  .quick-prompts{padding:0 8px 6px;gap:3px;flex-wrap:wrap;}
  .qp{font-size:9px;padding:2px 6px;}
  
  .input-bar{padding:6px 8px;gap:4px;}
  textarea{font-size:11px;padding:6px 8px;max-height:100px;}
  .send-btn{width:30px;height:30px;margin:2px 2px 2px 0;}
  
  .proj-header{padding:10px 12px;}

  .proj-field input,.proj-field textarea,.proj-field select{padding:5px 6px;font-size:11px;}

  .modal-card{padding:16px 20px;max-width:95vw;}

  .export-opt-label{font-size:11px;}
  .export-opt-desc{font-size:9px;}
}

@media (max-width:360px){
  header h1 span{display:none;}
  .ml-auto{gap:2px;}
  .hbtn{padding:2px 4px;font-size:8px;}
  .nav-btn{padding:4px 6px;font-size:9px;}
  .stag{font-size:7px;padding:0 3px;}
  .ptab{padding:5px;font-size:9px;}
}
</style>
</head>
<body>

<!-- EXPORT MODAL -->
<div id="exportModal" class="hidden">
  <div class="modal-card">
    <h3>Export conversation</h3>
    <p>Choose a format to download the current chat session.</p>
    <div class="export-opts">
      <label class="export-opt selected" onclick="selectExport(this)">
        <input type="radio" name="expfmt" value="md" checked>
        <div><div class="export-opt-label">Markdown (.md)</div><div class="export-opt-desc">Clean readable text with code blocks preserved</div></div>
      </label>
      <label class="export-opt" onclick="selectExport(this)">
        <input type="radio" name="expfmt" value="txt">
        <div><div class="export-opt-label">Plain text (.txt)</div><div class="export-opt-desc">Simple text, no formatting</div></div>
      </label>
      <label class="export-opt" onclick="selectExport(this)">
        <input type="radio" name="expfmt" value="json">
        <div><div class="export-opt-label">JSON (.json)</div><div class="export-opt-desc">Full conversation data for re-importing</div></div>
      </label>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeExport()">Cancel</button>
      <button class="modal-export-btn" onclick="doExport()">Download</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header>
  <button class="nav-toggle" id="navToggle" onclick="toggleNav()">☰</button>
  <div class="hlogo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 75V35a22 22 0 1 1 0 40z" fill="#fff"/>
      <path d="M50 13a22 22 0 0 1 22 22v4H50V13z" fill="#008080"/>
      <path d="M50 39h22a22 22 0 0 1-22 22z" fill="#008080"/>
    </svg>
  </div>
  <h1>Palisson <span>Co-developer</span></h1>
  <span class="hbadge">AI Agent</span>
</header>

<div class="app">
  <!-- LEFT NAV -->
  <aside class="leftnav">
    <div class="nav-section">Mode</div>
    <button class="nav-btn active" data-mode="general" onclick="setMode('general')"><span class="nav-icon">💬</span>General dev help</button>
    <button class="nav-btn" data-mode="component" onclick="setMode('component')"><span class="nav-icon">🧩</span>Build a component</button>
    <button class="nav-btn" data-mode="review" onclick="setMode('review')"><span class="nav-icon">🔍</span>Review my code</button>
    <button class="nav-btn" data-mode="bug" onclick="setMode('bug')"><span class="nav-icon">🐛</span>Debug an issue</button>
    <button class="nav-btn" data-mode="seo" onclick="setMode('seo')"><span class="nav-icon">🏷️</span>HTML & SEO</button>
    <button class="nav-btn" data-mode="client" onclick="setMode('client')"><span class="nav-icon">🏢</span>Client brief</button>
    <div class="nav-section">Stack</div>
    <div class="stack-tags">
      <span class="stag on">React</span><span class="stag on">HTML5</span>
      <span class="stag on">CSS3</span><span class="stag on">JS</span>
      <span class="stag">Node</span><span class="stag">Tailwind</span>
    </div>
    <div class="ctx-box">Cape Town · SMB focused<br>Teal #008080 · Black · White<br>Clean, end-user-first UI</div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TABS -->
    <div class="panel-tabs">
      <button class="ptab active" onclick="showPanel('chat')">💬 Chat</button>
      <button class="ptab" onclick="showPanel('history')">🕐 History</button>
      <button class="ptab" onclick="showPanel('projects')">📁 Projects</button>
    </div>

    <!-- CHAT PANEL -->
    <div id="chatPanel" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="chat-topbar">
        <span class="session-name" id="sessionNameDisplay" onclick="editSessionName()">New session</span>
        <input class="session-name-input" id="sessionNameInput" style="display:none" onblur="saveSessionName()" onkeydown="if(event.key==='Enter')saveSessionName()"/>
        <button class="tbar-btn" onclick="newSession()">+ New chat</button>
        <button class="tbar-btn" onclick="openExport()">⬇ Export</button>
        <button class="tbar-btn danger" onclick="clearCurrentSession()">Clear</button>
      </div>
      <div class="chat-window" id="chatWindow"></div>
      <div class="quick-prompts" id="quickPrompts">
        <button class="qp" onclick="usePrompt('Scaffold a responsive navbar with logo and 4 nav links in React')">React navbar</button>
        <button class="qp" onclick="usePrompt('Write a reusable Card component in React with title, description and CTA button')">Card component</button>
        <button class="qp" onclick="usePrompt('What HTML meta tags should every client site have for SEO?')">SEO meta checklist</button>
        <button class="qp" onclick="usePrompt('Review this CSS for issues:\n\n/* paste CSS here */')">Review my CSS</button>
        <button class="qp" onclick="usePrompt('Create a mobile-first hero section in HTML and CSS using Palisson brand colours')">Brand hero section</button>
      </div>
      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="userInput" placeholder="Ask me anything — paste code, describe a component, or share a client brief…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="historyPanel">
      <div class="panel-toolbar">
        <input type="text" id="historySearch" placeholder="Search sessions…" oninput="renderHistory()"/>
        <button class="tbar-btn" onclick="newSession();showPanel('chat')">+ New chat</button>
      </div>
      <div class="session-list" id="sessionList"></div>
    </div>

    <!-- PROJECTS PANEL -->
    <div id="projectsPanel">
      <div class="projects-split">
        <div class="projects-list">
          <div class="pl-toolbar">
            <div class="pl-title">Client Projects</div>
            <button class="new-proj-btn" onclick="newProject()">+ New project</button>
          </div>
          <div class="pl-items" id="projList"></div>
        </div>
        <div class="proj-detail" id="projDetail">
          <div class="no-proj">Select a project or create a new one</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STORAGE KEYS
// ═══════════════════════════════════════════════
const KEY_SESS   = 'pt_sessions';
const KEY_CURRID = 'pt_current_session';
const KEY_PROJS  = 'pt_projects';

// ═══════════════════════════════════════════════
// SESSION / HISTORY
// ═══════════════════════════════════════════════
function getSessions(){ try{return JSON.parse(localStorage.getItem(KEY_SESS))||[];}catch{return[];} }
function saveSessions(s){ localStorage.setItem(KEY_SESS,JSON.stringify(s)); }
function getCurrentId(){ return localStorage.getItem(KEY_CURRID)||null; }
function setCurrentId(id){ localStorage.setItem(KEY_CURRID,id); }

let conversation=[];
let currentSessionId=null;
let currentSessionName='New session';

function newSession(){
  const id='sess_'+Date.now();
  const sess={id,name:'New session',mode:'general',messages:[],created:Date.now(),updated:Date.now()};
  const sessions=getSessions();
  sessions.unshift(sess);
  saveSessions(sessions);
  loadSession(id);
}

function loadSession(id){
  const sessions=getSessions();
  const sess=sessions.find(s=>s.id===id);
  if(!sess)return;
  currentSessionId=id;
  setCurrentId(id);
  conversation=sess.messages||[];
  currentSessionName=sess.name||'New session';
  document.getElementById('sessionNameDisplay').textContent=currentSessionName;
  setMode(sess.mode||'general',true);
  renderChatFromHistory();
  renderHistory();
}

function saveCurrentSession(){
  if(!currentSessionId)return;
  const sessions=getSessions();
  const idx=sessions.findIndex(s=>s.id===currentSessionId);
  if(idx===-1)return;
  sessions[idx].messages=conversation;
  sessions[idx].name=currentSessionName;
  sessions[idx].mode=currentMode;
  sessions[idx].updated=Date.now();
  saveSessions(sessions);
  renderHistory();
}

function deleteSession(id,e){
  e.stopPropagation();
  if(!confirm('Delete this session?'))return;
  let sessions=getSessions().filter(s=>s.id!==id);
  saveSessions(sessions);
  if(currentSessionId===id){
    conversation=[];
    currentSessionId=null;
    if(sessions.length>0)loadSession(sessions[0].id);
    else{newSession();}
  }else renderHistory();
}

function editSessionName(){
  const disp=document.getElementById('sessionNameDisplay');
  const inp=document.getElementById('sessionNameInput');
  inp.value=currentSessionName;
  disp.style.display='none';
  inp.style.display='block';
  inp.focus();inp.select();
}

function saveSessionName(){
  const inp=document.getElementById('sessionNameInput');
  const disp=document.getElementById('sessionNameDisplay');
  const v=inp.value.trim()||'Untitled session';
  currentSessionName=v;
  disp.textContent=v;
  inp.style.display='none';
  disp.style.display='';
  saveCurrentSession();
}

function clearCurrentSession(){
  if(!confirm('Clear this chat? This cannot be undone.'))return;
  conversation=[];
  document.getElementById('chatWindow').innerHTML='';
  appendWelcome();
  saveCurrentSession();
}

function renderChatFromHistory(){
  const cw=document.getElementById('chatWindow');
  cw.innerHTML='';
  if(conversation.length===0){appendWelcome();return;}
  conversation.forEach(m=>{
    appendMessage(m.role==='assistant'?'agent':'user',m.content,false);
  });
  cw.scrollTop=cw.scrollHeight;
}

function renderHistory(){
  const q=(document.getElementById('historySearch')||{}).value||'';
  const sessions=getSessions().filter(s=>!q||s.name.toLowerCase().includes(q.toLowerCase()));
  const list=document.getElementById('sessionList');
  if(sessions.length===0){
    list.innerHTML=`<div class="empty-state"><div class="es-icon">🕐</div><p>No sessions yet.<br>Start a chat to see your history here.</p></div>`;
    return;
  }
  list.innerHTML=sessions.map(s=>{
    const d=new Date(s.updated);
    const date=d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
    const time=d.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
    const preview=s.messages.length>0?s.messages[s.messages.length-1].content.slice(0,80)+'…':'No messages yet';
    const isCurrent=s.id===currentSessionId;
    return `<div class="session-item${isCurrent?' current':''}" onclick="loadSession('${s.id}');showPanel('chat')">
      <div class="si-info">
        <div class="si-name">${esc(s.name)}</div>
        <div class="si-meta">${date} · ${time} · ${s.messages.length} messages</div>
        <div class="si-preview">${esc(preview)}</div>
      </div>
      <button class="si-del" onclick="deleteSession('${s.id}',event)" title="Delete">✕</button>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// PROJECTS
// ═══════════════════════════════════════════════
function getProjects(){ try{return JSON.parse(localStorage.getItem(KEY_PROJS))||[];}catch{return[];} }
function saveProjects(p){ localStorage.setItem(KEY_PROJS,JSON.stringify(p)); }

let activeProjectId=null;

function newProject(){
  const id='proj_'+Date.now();
  const proj={
    id,name:'New Client Project',client:'',status:'prospect',
    url:'',stack:'React, HTML, CSS',deadline:'',
    notes:'',tags:[],created:Date.now(),updated:Date.now()
  };
  const projs=getProjects();
  projs.unshift(proj);
  saveProjects(projs);
  activeProjectId=id;
  renderProjects();
  renderProjectDetail();
}

function deleteProject(id){
  if(!confirm('Delete this project?'))return;
  let projs=getProjects().filter(p=>p.id!==id);
  saveProjects(projs);
  if(activeProjectId===id){activeProjectId=null;}
  renderProjects();
  renderProjectDetail();
}

function saveProjectField(id,field,value){
  const projs=getProjects();
  const idx=projs.findIndex(p=>p.id===id);
  if(idx===-1)return;
  projs[idx][field]=value;
  projs[idx].updated=Date.now();
  saveProjects(projs);
  if(field==='name'||field==='client'||field==='status')renderProjects();
  showSaveIndicator();
}

function addTag(id,tag){
  tag=tag.trim();
  if(!tag)return;
  const projs=getProjects();
  const idx=projs.findIndex(p=>p.id===id);
  if(idx===-1||projs[idx].tags.includes(tag))return;
  projs[idx].tags.push(tag);
  saveProjects(projs);
  renderProjectDetail();
}

function removeTag(id,tag){
  const projs=getProjects();
  const idx=projs.findIndex(p=>p.id===id);
  if(idx===-1)return;
  projs[idx].tags=projs[idx].tags.filter(t=>t!==tag);
  saveProjects(projs);
  renderProjectDetail();
}

let saveTimer=null;
function showSaveIndicator(){
  const el=document.getElementById('saveIndicator');
  if(!el)return;
  el.textContent='Saved ✓';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{el.textContent='';},2000);
}

function renderProjects(){
  const projs=getProjects();
  const list=document.getElementById('projList');
  if(projs.length===0){
    list.innerHTML=`<div style="padding:12px;font-size:12px;color:var(--gray-400);text-align:center;">No projects yet</div>`;
    return;
  }
  list.innerHTML=projs.map(p=>`
    <div class="proj-item${p.id===activeProjectId?' active':''}" onclick="selectProject('${p.id}')">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-client">${esc(p.client)||'No client name'}</div>
    </div>`).join('');
}

function selectProject(id){
  activeProjectId=id;
  renderProjects();
  renderProjectDetail();
}

function renderProjectDetail(){
  const detail=document.getElementById('projDetail');
  if(!activeProjectId){
    detail.innerHTML=`<div class="no-proj">Select a project or create a new one</div>`;
    return;
  }
  const projs=getProjects();
  const p=projs.find(p=>p.id===activeProjectId);
  if(!p){detail.innerHTML=`<div class="no-proj">Project not found</div>`;return;}
  detail.innerHTML=`
    <div class="proj-header">
      <input class="proj-title-inp" value="${esc(p.name)}" placeholder="Project name"
        onchange="saveProjectField('${p.id}','name',this.value)" oninput="saveProjectField('${p.id}','name',this.value)"/>
      <span class="save-indicator" id="saveIndicator"></span>
      <button class="proj-del-btn" onclick="deleteProject('${p.id}')">Delete</button>
    </div>
    <div class="proj-body">
      <div class="proj-field">
        <label>Client name</label>
        <input value="${esc(p.client)}" placeholder="e.g. Mama's Bakery" onchange="saveProjectField('${p.id}','client',this.value)"/>
      </div>
      <div class="proj-field">
        <label>Status</label>
        <select onchange="saveProjectField('${p.id}','status',this.value)">
          <option value="prospect"${p.status==='prospect'?' selected':''}>Prospect</option>
          <option value="active"${p.status==='active'?' selected':''}>Active</option>
          <option value="completed"${p.status==='completed'?' selected':''}>Completed</option>
        </select>
      </div>
      <div class="proj-field">
        <label>Live URL</label>
        <input value="${esc(p.url)}" placeholder="https://client.co.za" type="url" onchange="saveProjectField('${p.id}','url',this.value)"/>
      </div>
      <div class="proj-field">
        <label>Tech stack</label>
        <input value="${esc(p.stack)}" placeholder="React, HTML, CSS…" onchange="saveProjectField('${p.id}','stack',this.value)"/>
      </div>
      <div class="proj-field">
        <label>Deadline</label>
        <input type="date" value="${esc(p.deadline)}" onchange="saveProjectField('${p.id}','deadline',this.value)"/>
      </div>
      <div class="proj-field">
        <label>Notes</label>
        <textarea placeholder="Brief, requirements, decisions, client feedback…" onchange="saveProjectField('${p.id}','notes',this.value)">${esc(p.notes)}</textarea>
      </div>
      <div class="proj-field">
        <label>Tags</label>
        <div class="tags-display" id="tagDisplay">
          ${(p.tags||[]).map(t=>`<span class="ptag">${esc(t)}<button onclick="removeTag('${p.id}','${esc(t)}')">×</button></span>`).join('')}
        </div>
        <input class="proj-tags-inp" placeholder="Add tag and press Enter (e.g. e-commerce, branding)"
          onkeydown="if(event.key==='Enter'){addTag('${p.id}',this.value);this.value='';event.preventDefault();}"/>
      </div>
      <button class="proj-chat-btn" onclick="openProjectChat('${p.id}')">💬 Open in chat with context</button>
    </div>`;
}

function openProjectChat(id){
  const projs=getProjects();
  const p=projs.find(p=>p.id===id);
  if(!p)return;
  newSession();
  currentSessionName=p.name;
  document.getElementById('sessionNameDisplay').textContent=p.name;
  saveCurrentSession();
  const brief=`I'm working on a client project. Here's the context:\n\nClient: ${p.client||'TBD'}\nProject: ${p.name}\nStack: ${p.stack}\nStatus: ${p.status}\nDeadline: ${p.deadline||'TBD'}\nNotes: ${p.notes||'None yet'}\n\nKeep this context in mind as we work.`;
  document.getElementById('userInput').value=brief;
  autoResize(document.getElementById('userInput'));
  showPanel('chat');
}

// ═══════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════
function openExport(){
  if(conversation.length===0){alert('Nothing to export yet — start a conversation first.');return;}
  document.getElementById('exportModal').classList.remove('hidden');
}
function closeExport(){ document.getElementById('exportModal').classList.add('hidden'); }
function selectExport(label){
  document.querySelectorAll('.export-opt').forEach(o=>o.classList.remove('selected'));
  label.classList.add('selected');
}
function doExport(){
  const fmt=document.querySelector('input[name=expfmt]:checked').value;
  let content='',ext='',mime='';
  const name=currentSessionName||'palisson-chat';
  if(fmt==='json'){
    content=JSON.stringify({session:name,date:new Date().toISOString(),messages:conversation},null,2);
    ext='json';mime='application/json';
  } else if(fmt==='md'){
    content=`# ${name}\n_Exported ${new Date().toLocaleString('en-ZA')}_\n\n---\n\n`;
    conversation.forEach(m=>{
      content+=`## ${m.role==='user'?'You':'Co-developer'}\n\n${m.content}\n\n---\n\n`;
    });
    ext='md';mime='text/markdown';
  } else {
    content=`${name}\nExported ${new Date().toLocaleString('en-ZA')}\n${'─'.repeat(40)}\n\n`;
    conversation.forEach(m=>{
      content+=`${m.role==='user'?'YOU':'CO-DEV'}: ${m.content}\n\n`;
    });
    ext='txt';mime='text/plain';
  }
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${name.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.${ext}`;
  a.click();
  closeExport();
}

// ═══════════════════════════════════════════════
// PANEL SWITCHING
// ═══════════════════════════════════════════════
function showPanel(p){
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',['chat','history','projects'][i]===p));
  const panels={chat:'chatPanel',history:'historyPanel',projects:'projectsPanel'};
  Object.entries(panels).forEach(([key,id])=>{
    const el=document.getElementById(id);
    if(key===p){el.style.display='flex';}
    else{el.style.display='none';}
  });
  closeNav();
  if(p==='history')renderHistory();
  if(p==='projects'){renderProjects();renderProjectDetail();}
}

// ═══════════════════════════════════════════════
// MODES
// ═══════════════════════════════════════════════
const MODES={
  general:{label:'General dev help',prompt:''},
  component:{label:'Build a component',prompt:'The user wants to build a React or HTML/CSS component. Ask clarifying questions if needed, then provide clean, complete, copy-paste-ready code with brief inline comments.'},
  review:{label:'Code review',prompt:'The user is sharing code for review. Identify issues with structure, performance, accessibility, and maintainability. Be specific and constructive. Format feedback as numbered points.'},
  bug:{label:'Debug',prompt:'The user has a bug. Help them diagnose it methodically. Ask for error messages, browser console output, or relevant code snippets. Explain root cause clearly.'},
  seo:{label:'HTML & SEO',prompt:'The user needs help with semantic HTML structure, meta tags, or on-page SEO for small-to-medium business websites.'},
  client:{label:'Client brief',prompt:"The user is starting a new client website project. Help them think through the tech stack, page structure, component list, and timeline. Ask about the client's industry, audience, and goals."},
};
let currentMode='general';

function setMode(mode,silent=false){
  currentMode=mode;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  closeNav();
  if(!silent){
    const note=document.createElement('div');
    note.className='mode-divider';
    note.textContent=`— ${MODES[mode].label} mode —`;
    document.getElementById('chatWindow').appendChild(note);
    document.getElementById('chatWindow').scrollTop=99999;
  }
}

// ═══════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════
const SYSTEM_PROMPT=`You are the Palisson Technologies co-developer AI agent — a senior front-end developer and trusted technical partner for Palisson Technologies, a front-end development studio based in Cape Town, South Africa.

COMPANY CONTEXT:
- Founded 2020. Builds clean, user-focused interfaces for small to medium sized businesses in South Africa.
- Core stack: HTML5, CSS3, JavaScript (ES6+), React. Design tools: Photoshop, InDesign, Illustrator, Adobe XD, InVision.
- Brand colours: Teal (#008080), Black (#000000), White (#FFFFFF).
- Brand fonts: Roboto Light, Futura Bold, Helvetica Light, Helvetica Bold, Poppins.
- Aesthetic: clean, minimal, end-user first. No clutter.
- Services: web development, branding, UI prototyping, logos, SEO.

YOUR ROLE:
1. Scaffold React components and full pages
2. Write clean, semantic HTML and CSS
3. Code reviews — bugs, performance, accessibility
4. Debug methodically
5. Spec out client projects
6. SEO-friendly HTML structure
7. Responsive mobile-first CSS

BEHAVIOUR:
- Clean, readable, commented code.
- Default to React functional components with hooks.
- Always use semantic HTML5 elements.
- Mobile-first CSS with CSS custom properties.
- Specific, constructive code review feedback.
- Direct and efficient — skip preamble.
- One clarifying question max if ambiguous.
- Fenced code blocks with correct language tag.
- Keep Palisson brand context in mind: teal accent, clean, client-friendly.`;

let thinking=false;

function appendWelcome(){
  appendMessage('agent',`**Hey, I'm your Palisson co-developer.**\n\nI know your stack — React, HTML, CSS, JavaScript — and I build with your brand in mind: clean interfaces, teal \`#008080\`, small-to-medium business clients.\n\nPick a mode on the left or just tell me what you're working on.`,false);
}

function appendMessage(role,content,save=true){
  const cw=document.getElementById('chatWindow');
  const msg=document.createElement('div');
  msg.className=`msg ${role}`;
  const av=document.createElement('div');
  av.className=`avatar ${role}`;
  av.textContent=role==='agent'?'PT':'You';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.innerHTML=formatContent(content);
  // Add copy buttons to pre blocks
  bub.querySelectorAll('pre').forEach(pre=>{
    const btn=document.createElement('button');
    btn.className='copy-code';
    btn.textContent='Copy';
    btn.onclick=()=>{
      navigator.clipboard.writeText(pre.querySelector('code')?.innerText||pre.innerText);
      btn.textContent='Copied!';
      setTimeout(()=>btn.textContent='Copy',1500);
    };
    pre.appendChild(btn);
  });
  msg.appendChild(av);
  msg.appendChild(bub);
  cw.appendChild(msg);
  cw.scrollTop=cw.scrollHeight;
  if(save)saveCurrentSession();
  return bub;
}

function showThinking(){
  const cw=document.getElementById('chatWindow');
  const msg=document.createElement('div');
  msg.className='msg agent';msg.id='thinkingMsg';
  const av=document.createElement('div');av.className='avatar agent';av.textContent='PT';
  const bub=document.createElement('div');bub.className='bubble thinking';
  bub.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msg.appendChild(av);msg.appendChild(bub);
  cw.appendChild(msg);cw.scrollTop=cw.scrollHeight;
}
function hideThinking(){const e=document.getElementById('thinkingMsg');if(e)e.remove();}

function formatContent(text){
  let t=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```(\w+)?\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/^### (.+)$/gm,'<strong>$1</strong>');
  t=t.replace(/^## (.+)$/gm,'<strong>$1</strong>');
  t=t.replace(/^- (.+)$/gm,'<li>$1</li>');
  t=t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t=t.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<p>${t}</p>`;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function usePrompt(t){const i=document.getElementById('userInput');i.value=t;autoResize(i);i.focus();}

function showError(msg){
  const cw=document.getElementById('chatWindow');
  const e=document.createElement('div');e.className='err-bubble';e.textContent=msg;
  cw.appendChild(e);cw.scrollTop=cw.scrollHeight;
}

async function sendMessage(){
  if(thinking)return;
  const inp=document.getElementById('userInput');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  appendMessage('user',text);
  conversation.push({role:'user',content:text});
  thinking=true;showThinking();
  const modeExtra=MODES[currentMode].prompt;
  const sys=modeExtra?`${SYSTEM_PROMPT}\n\nCURRENT MODE: ${MODES[currentMode].label}. ${modeExtra}`:SYSTEM_PROMPT;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:conversation})
    });
    const data=await res.json();
    hideThinking();thinking=false;
    document.getElementById('sendBtn').disabled=false;
    if(data.content&&data.content[0]){
      const reply=data.content[0].text;
      conversation.push({role:'assistant',content:reply});
      appendMessage('agent',reply);
    } else {
      showError('No response received. Check your connection and try again.');
    }
  }catch(err){
    hideThinking();thinking=false;
    document.getElementById('sendBtn').disabled=false;
    showError('Connection error. Check your internet and API key.');
  }
}

// RESPONSIVE NAV TOGGLE

function toggleNav(){
  const nav=document.querySelector('.leftnav');
  nav.classList.toggle('open');
}
function closeNav(){
  const nav=document.querySelector('.leftnav');
  nav.classList.remove('open');
}
document.addEventListener('click',e=>{
  const nav=document.querySelector('.leftnav');
  const toggle=document.getElementById('navToggle');
  if(!nav.contains(e.target)&&!toggle.contains(e.target)){
    closeNav();
  }
});

window.addEventListener('DOMContentLoaded',()=>{
  if(loadKey()) document.getElementById('gate').classList.add('hidden');
  // Load or create session
  const savedId=getCurrentId();
  const sessions=getSessions();
  if(savedId&&sessions.find(s=>s.id===savedId)){
    loadSession(savedId);
  } else if(sessions.length>0){
    loadSession(sessions[0].id);
  } else {
    newSession();
  }
  showPanel('chat');
});
